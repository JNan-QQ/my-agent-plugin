[pytest]
addopts =
    --browser chromium
    --screenshot only-on-failure
    --video retain-on-failure
    --output report/
    -v
    --tb=short

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    slow: 标记慢速测试
    integration: 标记集成测试
    smoke: 标记冒烟测试
